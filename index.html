  <!-- Theme initialization script - CRITICAL: This must run before any other scripts -->
  <script>
    // IIFE to avoid polluting global scope
    (function () {
      try {
        console.log('Theme initialization script running...');

        // First remove any existing theme classes
        document.documentElement.classList.remove('light', 'dark');

        // Check for saved theme preference
        const savedTheme = localStorage.getItem('theme');
        console.log('Saved theme from localStorage:', savedTheme);

        // Check system preference
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        console.log('System prefers dark mode:', prefersDark);

        // Force theme application
        let themeToApply;

        if (savedTheme === 'light') {
          themeToApply = 'light';
          console.log('Using light theme from localStorage');
        } else if (savedTheme === 'dark') {
          themeToApply = 'dark';
          console.log('Using dark theme from localStorage');
        } else if (prefersDark) {
          themeToApply = 'dark';
          localStorage.setItem('theme', 'dark');
          console.log('Using dark theme from system preference');
        } else {
          themeToApply = 'light'; // Default to light theme
          localStorage.setItem('theme', 'light');
          console.log('Using default light theme');
        }

        // Apply the theme
        document.documentElement.classList.add(themeToApply);

        // Update meta theme color
        const metaThemeColor = document.querySelector('meta[name="theme-color"]');
        if (metaThemeColor) {
          metaThemeColor.setAttribute('content', themeToApply === 'dark' ? '#0f172a' : '#ffffff');
        }

        console.log('Theme applied successfully:', themeToApply);

        // Create a global function that can be called from anywhere to toggle theme
        window.toggleTheme = function () {
          const html = document.documentElement;
          const isDark = html.classList.contains('dark');

          // Toggle theme
          html.classList.remove('dark', 'light');
          html.classList.add(isDark ? 'light' : 'dark');

          // Save preference
          localStorage.setItem('theme', isDark ? 'light' : 'dark');

          // Update meta theme color
          const metaThemeColor = document.querySelector('meta[name="theme-color"]');
          if (metaThemeColor) {
            metaThemeColor.setAttribute('content', isDark ? '#ffffff' : '#0f172a');
          }

          console.log('Theme toggled to:', isDark ? 'light' : 'dark');
          return !isDark;
        };
      } catch (error) {
        console.error('Error in theme initialization:', error);
      }
    })();
  </script>
